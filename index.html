    <script>
        // دالة تحويل الأرقام الإنجليزية للعربية في واجهة المستخدم
        const arabicNumbers = ['٠', '١', '٢', '٣', '٤', '٥', '٦', '٧', '٨', '٩'];
        function toArabicDigits(num) {
            return String(num).replace(/[0-9]/g, w => arabicNumbers[+w]);
        }

        // دالة لخلط المصفوفة عشوائياً (Shuffle)
        function shuffleArray(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // بيانات الأسئلة

                { q: 'ما مصدر الفعل "غَلَى"؟', options: ['غُلُو', 'غَلَيان', 'إغلاء'], correctIndex: 1, hint: 'الماء عندما يغلي يحدث له حركة واضطراب.', explanation: 'لأن الفعل (غلى) يدل على حركة واضطراب، فمصدره يأتي على وزن (فَعَلان).' },

                { q: 'ما المصدر الصحيح للفعل "خَضِرَ"؟', options: ['اخضرار', 'خُضْرَة', 'تَخْضِير'], correctIndex: 1, hint: 'الفعل هنا ثلاثي، تذكر وزن ما دل على لون.', explanation: 'لأن الفعل (خَضِرَ) ثلاثي يدل على لون، فمصدره يأتي على وزن (فُعْلَة). أما "اخضرار" فهو مصدر لفعل خماسي (اخضرّ).' },
                { q: 'مصدر الفعل الثلاثي "طَارَ" هو "إطارة".', options: ['صواب', 'خطأ'], correctIndex: 1, hint: 'الفعل يدل على حركة، فهل (إطارة) تدل على حركة على وزن (فعلان)؟', explanation: 'مصدر الفعل (طار) هو (طَيَران)؛ لأنه يدل على حركة وتقلب (وزن فَعَلان). أما (إطارة) فمصدر لفعل رباعي (أطار).' },
                { q: 'على أي شيء يدل مصدر الفعل "زَئير"؟', options: ['لون', 'صوت', 'حرفة'], correctIndex: 1, hint: 'ماذا نسمي ما يصدره الأسد؟', explanation: 'زئير هو صوت الأسد، والفعل (زأَرَ) يدل على صوت، فمصدره يأتي على وزن (فَعِيل).' },

            'quad': [

                { q: 'ما مصدر الفعل "اطْمَأَنَّ"؟', options: ['اطْمِئْنان', 'طُمَأْنينة', 'تَطْمِين'], correctIndex: 0, hint: 'هذا الفعل سداسي (النون مشددة) ومبدوء بهمزة وصل.', explanation: 'الفعل سداسي (النون مضعفة)، وزنه (افْعَلَلَّ) ومصدره يأتي على وزن (افْعِلْلال).' }
            ],
            'comprehensive': [
                { q: 'كلمة "إِحْسان" مصدر لفعل:', options: ['ثلاثي', 'رباعي', 'خماسي'], correctIndex: 1, hint: 'حاول إرجاع الكلمة للفعل الماضي، ثم قم بعد حروفه.', explanation: 'لأن الفعل الماضي من كلمة (إِحْسان) هو (أَحْسَنَ) وهو يتكون من أربعة أحرف.' },
                { q: 'المصدر "اسْتِماع" فعله:', options: ['سداسي', 'خماسي', 'رباعي'], correctIndex: 1, hint: 'تأكد من الحروف الأصلية للفعل لتحديد هل السين أصلية أم زائدة.', explanation: 'الفعل الماضي هو (اسْتَمَعَ). حروفه ٥ (ا-س-ت-م-ع). السين هنا أصلية من مادة (س-م-ع) وليست زائدة للطلب كأفعال السداسي.' },
                { q: '"النجاح دائمًا ثمرة الاجتهاد الواضح". أين المصدر الخماسي في هذه الجملة؟', options: ['النجاح', 'دائمًا', 'الاجتهاد'], correctIndex: 2, hint: 'ابحث عن كلمة مبدوءة بهمزة وصل أو تاء زائدة تدل على حدث.', explanation: '(الاجتهاد) فعله (اجتهد) خماسي. أما (النجاح) فمصدر ثلاثي لفعل (نجح).' },
                { q: 'كلمة "إدارة" هي مصدر لفعل خماسي.', options: ['صواب', 'خطأ'], correctIndex: 1, hint: 'ما الفعل الماضي من إدارة؟ وهل هو خمسة أحرف؟', explanation: '(إدارة) مصدر لفعل رباعي هو (أدارَ)، على وزن (إفْعَلَة) أو (إفَالَة).' },
                { q: 'كلمة "تَعَاوُن" هي مصدر لفعل:', options: ['رباعي', 'خماسي', 'سداسي'], correctIndex: 1, hint: 'الفعل الماضي يبدأ بالتاء، قم بعد حروفه.', explanation: 'الفعل الماضي هو (تَعاوَنَ)، وهو خماسي مبدوء بتاء زائدة، فمصدره يأتي بضم ما قبل الآخر (تَعاوُن).' },
                { q: 'ما مصدر الفعل السداسي "اسْتَعْمَلَ"؟', options: ['تَعَامُل', 'اسْتِعْمال', 'إِعْمال'], correctIndex: 1, hint: 'تذكر قاعدة الفعل السداسي المبدوء بهمزة وصل.', explanation: 'فعل سداسي مبدوء بهمزة وصل، نكسر ثالثه ونزيد ألفًا قبل آخره.' },
                { q: 'كلمة "تَهْنِئَة" مصدر لفعل:', options: ['ثلاثي (هَنَأَ)', 'رباعي (هَنَّأَ)', 'خماسي (تَهَنَّأَ)'], correctIndex: 1, hint: 'المصدر على وزن (تفعلة)، فما وزن فعله؟', explanation: 'الفعل (هَنَّأَ) رباعي على وزن (فَعَّلَ) مهموز اللام، ومصدره يأتي على وزن (تَفْعِلَة) فتصبح تَهْنِئَة.' }
            ]
        };

        const sectionOrder = ['tri', 'quad', 'penta-hexa', 'comprehensive'];
        
        // حالة التطبيق
        const appState = {
            'tri': { score: 0, answered: 0, isDone: false },
            'quad': { score: 0, answered: 0, isDone: false },
            'penta-hexa': { score: 0, answered: 0, isDone: false },
            'comprehensive': { score: 0, answered: 0, isDone: false }
        };

        // تحديث شريط التقدم الكلي
        function updateGlobalProgress() {
            let totalQuestions = 0;
            let totalAnswered = 0;
            
            for (const key in quizData) {
                totalQuestions += quizData[key].length;
                totalAnswered += appState[key].answered;
            }
            
            const percent = (totalAnswered / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = `${percent}%`;

            if (percent === 100) {
                showGlobalSummary();
            }
        }

        // بناء الواجهة للقسم مع الخلط العشوائي
        function buildSection(sectionId) {
            const container = document.getElementById(`quiz-${sectionId}`);
            container.innerHTML = ''; 
            const questions = quizData[sectionId];
            
            questions.forEach((qItem, qIndex) => {
                const arabicQNum = toArabicDigits(qIndex + 1);

                // تجهيز الخيارات وخلطها
                let optionsWithMeta = qItem.options.map((optText, origIndex) => ({
                    text: optText,
                    isCorrect: origIndex === qItem.correctIndex
                }));
                optionsWithMeta = shuffleArray(optionsWithMeta);

                const qCard = document.createElement('div');
                qCard.className = 'bg-white p-5 md:p-6 rounded-2xl shadow-sm border border-slate-100';
                qCard.id = `card-${sectionId}-${qIndex}`;

                // رأس السؤال
                const qHeader = document.createElement('div');
                qHeader.className = 'flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3 mb-5';
                
                const qText = document.createElement('p');
                qText.className = 'text-xl md:text-2xl font-bold text-slate-800 leading-relaxed';
                qText.innerHTML = `<span class="text-indigo-600 font-bold ml-1">${arabicQNum}-</span> ${qItem.q}`;
                
                // زر التلميح
                const hintBtn = document.createElement('button');
                hintBtn.className = 'text-amber-500 hover:text-amber-600 bg-amber-50 px-3 py-1.5 rounded-lg transition-colors font-semibold text-sm border border-amber-100 flex items-center gap-1 self-start shrink-0';
                hintBtn.innerHTML = `<svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg> تلميح`;
                hintBtn.onclick = () => toggleHint(sectionId, qIndex);

                qHeader.appendChild(qText);
                qHeader.appendChild(hintBtn);
                qCard.appendChild(qHeader);

                // منطقة التلميح
                const hintDiv = document.createElement('div');
                hintDiv.id = `hint-${sectionId}-${qIndex}`;
                hintDiv.className = 'hidden mb-5 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-900 font-medium text-lg reveal-box';
                hintDiv.innerHTML = `${qItem.hint}`;
                qCard.appendChild(hintDiv);

                // الخيارات
                const optsContainer = document.createElement('div');
                optsContainer.className = 'flex flex-col gap-3';

                optionsWithMeta.forEach((optObj, renderIndex) => {
                    const label = document.createElement('label');
                    label.className = 'flex items-center gap-3 cursor-pointer p-4 rounded-xl transition-all border border-slate-200 hover:border-indigo-300 hover:bg-indigo-50/50 text-xl text-slate-700 bg-slate-50';
                    
                    const radio = document.createElement('input');
                    radio.type = 'radio';
                    radio.name = `radio-${sectionId}-${qIndex}`;
                    radio.value = optObj.isCorrect ? 'true' : 'false';
                    
                    radio.addEventListener('change', () => handleAnswer(sectionId, qIndex, radio, optObj.isCorrect, qCard, qItem, optionsWithMeta));

                    const span = document.createElement('span');
                    span.textContent = optObj.text;

                    label.appendChild(radio);
                    label.appendChild(span);
                    optsContainer.appendChild(label);
                });

                qCard.appendChild(optsContainer);

                // التغذية الراجعة
                const feedbackDiv = document.createElement('div');
                feedbackDiv.className = 'feedback-box hidden mt-5 p-5 rounded-xl border reveal-box';
                qCard.appendChild(feedbackDiv);

                container.appendChild(qCard);
            });
        }

        function toggleHint(sectionId, qIndex) {
            const hintDiv = document.getElementById(`hint-${sectionId}-${qIndex}`);
            hintDiv.classList.toggle('hidden');
        }

        function handleAnswer(sectionId, qIndex, selectedRadio, isCorrect, cardElement, qDataObj, currentOptionsMap) {
            if (cardElement.dataset.answered === 'true') return;
            cardElement.dataset.answered = 'true';

            appState[sectionId].answered++;
            if (isCorrect) appState[sectionId].score++;

            const allLabels = cardElement.querySelectorAll('label');
            const allRadios = cardElement.querySelectorAll('input[type="radio"]');
            const feedbackDiv = cardElement.querySelector('.feedback-box');

            allRadios.forEach((radio, index) => {
                radio.disabled = true;
                const label = allLabels[index];
                label.classList.remove('hover:border-indigo-300', 'hover:bg-indigo-50/50', 'cursor-pointer');
                label.classList.add('cursor-default');

                if (currentOptionsMap[index].isCorrect) {
                    label.classList.remove('border-slate-200', 'bg-slate-50');
                    label.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-900', 'font-bold');
                } else if (radio === selectedRadio && !isCorrect) {
                    label.classList.remove('border-slate-200', 'bg-slate-50', 'text-slate-700');
                    label.classList.add('border-red-400', 'bg-red-50', 'text-red-800', 'line-through');
                } else {
                    label.classList.add('opacity-50');
                }
            });

            feedbackDiv.classList.remove('hidden');
            
            const iconHTML = isCorrect 
                ? `<svg class="w-8 h-8 text-emerald-600 shrink-0 mt-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>`
                : `<svg class="w-8 h-8 text-red-600 shrink-0 mt-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>`;
            
            const titleHTML = isCorrect
                ? `<p class="text-2xl font-bold mb-2 text-emerald-800">إجابة صحيحة</p>`
                : `<p class="text-2xl font-bold mb-2 text-red-800">إجابة خاطئة</p>`;

            const bgClass = isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200';
            
            feedbackDiv.className = `feedback-box mt-5 p-5 rounded-xl border reveal-box ${bgClass}`;
            feedbackDiv.innerHTML = `
                <div class="flex items-start gap-3">
                    ${iconHTML}
                    <div>
                        ${titleHTML}
                        <p class="text-xl text-slate-800 leading-relaxed"><strong class="font-bold">التوضيح:</strong> ${qDataObj.explanation}</p>
                    </div>
                </div>`;

            updateGlobalProgress();

            if (appState[sectionId].answered === quizData[sectionId].length) {
                appState[sectionId].isDone = true;
                showSectionEnd(sectionId);
            }
        }

        function showSectionEnd(sectionId) {
            const endDiv = document.getElementById(`end-${sectionId}`);
            const score = appState[sectionId].score;
            const total = quizData[sectionId].length;
            
            endDiv.classList.remove('hidden');
            endDiv.innerHTML = `
                <div class="p-8 bg-white/80 rounded-2xl border border-slate-200 shadow-sm inline-block w-full max-w-md">
                    <h3 class="text-3xl font-bold text-slate-800 mb-4">نتيجة القسم</h3>
                    <div class="text-5xl font-bold text-indigo-700 mb-2" dir="ltr">${toArabicDigits(score)} / ${toArabicDigits(total)}</div>
                </div>
            `;
        }

        function resetSection(sectionId) {
            appState[sectionId].score = 0;
            appState[sectionId].answered = 0;
            appState[sectionId].isDone = false;
            document.getElementById(`end-${sectionId}`).classList.add('hidden');
            buildSection(sectionId);
            updateGlobalProgress();
            
            // التمرير لأعلى القسم بنعومة
            document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showGlobalSummary() {
            let totalScore = 0;
            let totalQs = 0;
            for (const key in appState) {
                totalScore += appState[key].score;
                totalQs += quizData[key].length;
            }
            const summaryDiv = document.getElementById('final-summary');
            document.getElementById('final-score-text').innerText = `${toArabicDigits(totalScore)} / ${toArabicDigits(totalQs)}`;
            summaryDiv.classList.remove('hidden');
        }

        // نظام التبويبات والتمرير
        function goToTab(targetId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
                btn.classList.add('bg-slate-50', 'text-slate-700');
            });

            document.getElementById(targetId).classList.add('active');
            
            const targetBtn = document.querySelector(`button[data-target="${targetId}"]`);
            if(targetBtn){
                targetBtn.classList.remove('bg-slate-50', 'text-slate-700');
                targetBtn.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                // التمرير الأفقي للتبويبات لضمان رؤية الزر النشط في الجوال
                targetBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // التمرير لمحتوى القسم بحيث تكون التبويبات في الأعلى
            document.getElementById(targetId).scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        document.getElementById('tabs-container').addEventListener('click', (e) => {
            const targetBtn = e.target.closest('.tab-btn');
            if (!targetBtn) return; 
            goToTab(targetBtn.getAttribute('data-target'));
        });

        // تهيئة التطبيق
        window.addEventListener('DOMContentLoaded', () => {
            sectionOrder.forEach(id => buildSection(id));
        });
    </script>
</body>
</html>
